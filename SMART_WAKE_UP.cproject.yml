project:
  packs:
    - pack: Keil::STM32F7xx_DFP
    - pack: ARM::CMSIS@5.9.0
  setups:
    - setup: Options for Target
      processor:
        fpu: dp
      debug: "on"
      misc:
        - C:
            - -std=c11
          C-CPP:
            - -fno-rtti
            - -funsigned-char
            - -fshort-enums
            - -fshort-wchar
            - -ffunction-sections
            - -w
          CPP:
            - -xc++
            - -std=c++14
          ASM:
            - -masm=auto
          Link:
            - --map
            - --load_addr_map_info
            - --xref
            - --callgraph
            - --symbols
            - --info sizes
            - --info totals
            - --info unused
            - --info veneers
            - --strict
            - --summary_stderr
            - --info summarysizes
  groups:
    - group: src
      files:
        - file: src/gpio.c
        - file: src/main.c
        - file: src/servo.c
        - file: src/tim.c
        - file: src/urm37.c
        - file: src/usart.c
        - file: src/st7920.c
        - file: src/ds3231.c
        - file: src/buttons.c
        - file: src/sh1106.c
    - group: inc
      files:
        - file: inc/gpio.h
        - file: inc/servo.h
        - file: inc/tim.h
        - file: inc/urm37.h
        - file: inc/usart.h
        - file: inc/st7920.h
        - file: inc/ds3231.h
        - file: inc/buttons.h
        - file: inc/sh1106.h
    - group: fonts
      files:
        - file: fonts/fonts.h
        - file: fonts/fonts_arial12x12.c
        - file: fonts/fonts_arial28x28.c
  components:
    - component: ARM::CMSIS:CORE
    - component: Keil::Device:Startup
